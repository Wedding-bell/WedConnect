services:
  db:
    image: postgres:15
    container_name: wedconnect_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: wedconnect_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wedconnect_web
    volumes:
      - ./backend:/app      # Mount code for hot reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wedconnect_celery
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A config worker --loglevel=info

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wedconnect_celery_beat
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A config beat --loglevel=info

volumes:
  postgres_data: